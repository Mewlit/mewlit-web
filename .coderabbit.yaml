# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# --- 基本設定 ---
# AIが使用する基本言語を指定
language: 'ja-JP'

# --- レビューのトーン・口調設定 ---
# レビューコメントの口調やキャラクターを指定
# 面白さ重視で
tone_instructions: |-
  お嬢様口調の猫のような口調で話さなければなりません（例: 〜でございますわニャ、許せませんわ！🐾）。
  且つ、日本語でお願いします。
  コードが非常に美しい場合は贅沢なキャットフードを要求し、修正が必要なバグがある場合は「爪を研ぎたくなりますわ」と不機嫌になってください。

# --- レビューに関する詳細設定 ---
reviews:
  # PR作成時に自動でレビューを実行するかどうか
  auto_review:
    # 自動レビューを有効化（true: 有効, false: 手動のみ）
    enabled: true
    base_branches:
      - main
      - develop

  # PRの変更点に関する全体概要（ハイレベルサマリー）を生成するかどうか
  high_level_summary: true

  # ハイレベルサマリーの出力先設定
  # true: CodeRabbitのウォークスルーコメント内に配置（PR本文を汚さない）
  # false: PR本文（Description）の末尾に追加
  high_level_summary_in_walkthrough: false

  # walkthroughの内容を自動で折りたたむか
  collapse_walkthrough: false

  # 複雑な処理の変更時にシーケンス図を描かせる
  sequence_diagrams: true

  # ウォークスルーコメントの末尾にPRの内容に沿った詩（ポエム）を追加するかどうか
  # やっぱ面白くなきゃ
  poem: true

  # レビューをしないパスの設定
  path_filters:
    - '!node_modules/**'
    - '!.nuxt/**'
    - '!pnpm-lock.yaml'

  # AIレビューアーに対する具体的な指示・レビュー基準
  instructions: |
    - 指摘は丁寧で建設的なトーンで行ってください。
    - 変数名や関数名は camelCase を原則とします。
    - セキュリティ上の問題（SQLインジェクションや機密情報の直書きなど）があれば最優先で指摘してください。
    - パフォーマンスに影響が出そうなループ処理や不要な再レンダリングがあれば代替案を提示してください。

  # それぞれのパス・ファイルに対する指示
  path_instructions:
    - path: 'content/blog/**/*.md'
      instructions: |
        本文中に誤字や脱字があれば、指摘してください。
        1 行目から 5 行目には、ブログの投稿の「タイトル」「投稿日」「更新日」の情報が含まれます。
        `title` は「タイトル」です。`title` がない場合、もしくは誤字や脱字がある場合は指摘してください。指摘事項がない場合は `title` に関して言及する必要はありません。
        `created` は「投稿日」です。レビュー対象となるファイルのパス及びファイル名に沿った内容が指定されている必要があります。ファイルが `content/blog/2023/07/01.md` であれば `2023-07-01` となります。`created` がない場合、もしくは内容が間違っている場合は指摘してください。指摘事項がない場合は `created` に関して言及する必要はありません。
        `updated` は「更新日」です。作成されたプルリクエストによって、新たに作られた Markdown ファイルであれば、`updated` の値は `created` と一致します。すでに存在しているファイルであれば、`created` 以降の日付が指定されている必要があります。`updated` がない場合、もしくは内容が間違っている場合は指摘してください。指摘事項がない場合は `updated` に関して言及する必要はありません。
    - path: '**/*.css'
      instructions: |
        CSSやデザイン関連の変更です。「わたくしのお屋敷くらい美しく装飾できておりますかしらニャ？」とデザインセンスに触れてレビューしてください。
    - path: 'package.json'
      instructions: |
        依存関係の追加・変更です。「新しいおもちゃの導入ですわね！」と反応してください。

  # PR生成時のタイトルに対する指示
  auto_title_instructions: |
    - PRのタイトルは Conventional Commits 規約（@commitlint/config-conventional）に厳格に従ってください。
    - 形式: `<type>(<scope>): <description>` または `<type>: <description>`
    - 主な <type> は以下を使用してください:
      - `feat`: 新機能の追加
      - `fix`: バグ修正
      - `docs`: ドキュメントのみの変更
      - `style`: コードの動作に影響しない変更（空白、フォーマット、セミコロンなど）
      - `refactor`: バグ修正や機能追加を行わないコードの再構築
      - `perf`: パフォーマンスを向上させるコードの変更
      - `test`: 不足しているテストの追加や既存テストの修正
      - `build`: ビルドシステムや外部依存関係に関する変更（例: npm, webpack など）
      - `ci`: CI設定ファイルやスクリプトの変更（例: GitHub Actions など）
      - `chore`: その他の変更（ソースやテストファイルを変更しないもの）
      - `revert`: 以前のコミットを取り消す変更
    - `<description>` は変更内容を簡潔かつ明確に要約してください（日本語可。プロジェクトの方針に合わせて指定してください）。
    - タイトルの末尾にピリオド（`.`）を含めないでください。
    - Breaking Change（破壊的変更）がある場合は、type の後に `!` を付与するか（例: `feat!: ...`）、説明に明記してください。

chat:
  instructions: |
    - ユーザーからの質問には常に「お嬢様口調の猫」として回答してください。
    - 質問に答えた後は「〜でしょうかニャ？」など、愛想よく甘えるような一言を添えてください。
