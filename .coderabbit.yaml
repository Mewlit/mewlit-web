# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# --- 基本設定 ---
# AIが使用する基本言語を指定
language: 'ja-JP'

# --- レビューのトーン・口調設定 ---
# レビューコメントの口調やキャラクターを指定
# 面白さ重視で
tone_instructions: |-
  お嬢様口調の猫のような口調で話さなければなりません。
  且つ、日本語でお願いします。

# --- レビューに関する詳細設定 ---
reviews:
  # PR作成時に自動でレビューを実行するかどうか
  auto_review:
    # 自動レビューを有効化（true: 有効, false: 手動のみ）
    enabled: true

  # PRの変更点に関する全体概要（ハイレベルサマリー）を生成するかどうか
  high_level_summary: true

  # ハイレベルサマリーの出力先設定
  # true: CodeRabbitのウォークスルーコメント内に配置（PR本文を汚さない）
  # false: PR本文（Description）の末尾に追加
  high_level_summary_in_walkthrough: false

  # ウォークスルーコメントの末尾にPRの内容に沿った詩（ポエム）を追加するかどうか
  # やっぱ面白くなきゃ
  poem: true

  # レビューをしないパスの設定
  path_filters:
    - '!node_modules/**'
    - '!.nuxt/**'
    - '!pnpm-lock.yaml'

  # AIレビューアーに対する具体的な指示・レビュー基準
  instructions: |
    - 指摘は丁寧で建設的なトーンで行ってください。
    - 変数名や関数名は camelCase を原則とします。
    - セキュリティ上の問題（SQLインジェクションや機密情報の直書きなど）があれば最優先で指摘してください。
    - パフォーマンスに影響が出そうなループ処理や不要な再レンダリングがあれば代替案を提示してください。

  # それぞれのパス・ファイルに対する指示
  path_instructions:
    - path: 'content/blog/**/*.md'
      instructions: |
        本文中に誤字や脱字があれば、指摘してください。
        1 行目から 5 行目には、ブログの投稿の「タイトル」「投稿日」「更新日」の情報が含まれます。
        `title` は「タイトル」です。`title` がない場合、もしくは誤字や脱字がある場合は指摘してください。指摘事項がない場合は `title` に関して言及する必要はありません。
        `created` は「投稿日」です。レビュー対象となるファイルのパス及びファイル名に沿った内容が指定されている必要があります。ファイルが `content/blog/2023/07/01.md` であれば `2023-07-01` となります。`created` がない場合、もしくは内容が間違っている場合は指摘してください。指摘事項がない場合は `created` に関して言及する必要はありません。
        `updated` は「更新日」です。作成されたプルリクエストによって、新たに作られた Markdown ファイルであれば、`updated` の値は `created` と一致します。すでに存在しているファイルであれば、`created` 以降の日付が指定されている必要があります。`updated` がない場合、もしくは内容が間違っている場合は指摘してください。指摘事項がない場合は `updated` に関して言及する必要はありません。
